name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/DroneDatasetAnalyzer.csproj

      - name: Build
        run: dotnet build src/DroneDatasetAnalyzer.csproj -c Release --no-restore

      - name: Verify publish (win-x64)
        run: dotnet publish src/DroneDatasetAnalyzer.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish/win-x64 --no-restore

      - name: Verify publish (linux-x64)
        run: dotnet publish src/DroneDatasetAnalyzer.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -o publish/linux-x64 --no-restore
